name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    uses: fissible/.github/.github/workflows/release.yml@main

  packagist:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Notify Packagist
        run: |
          curl -s -X POST "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://packagist.org/packages/fissible/forge"}}'
